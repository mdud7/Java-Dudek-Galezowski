spring.application.name=ProjectManagerApp

# PostgreSQL (Neon) configuration - prefer environment variables for secrets
# Preferred: provide a full JDBC URL via `JDBC_DATABASE_URL`.
# Example: jdbc:postgresql://db.neon.tech:5432/mydb?sslmode=require
spring.datasource.url=jdbc:postgresql://ep-purple-band-alpjmlv8-pooler.c-3.eu-central-1.aws.neon.tech:5432/task_manager?sslmode=require&channel_binding=require

# Alternatively provide a platform-style DATABASE_URL (postgres://user:pass@host:port/db)
# and the app will convert it when a DataSource bean parses `DATABASE_URL` (if present).
spring.datasource.username=michal
spring.datasource.password=haslo_do_PSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Notes:
# - Neon requires TLS; include `?sslmode=require` in the JDBC URL or ensure the conversion
#   adds it when no query params are present.
# - For local development you can set these env vars in your shell or in an .env file handled
#   by your run tooling. In CI/CD set secrets in the pipeline settings.
# - If you use `DATABASE_URL`, ensure it includes the SSL mode parameter, e.g.:
#   postgres://user:pass@host:port/db?sslmode=require

